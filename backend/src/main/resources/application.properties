spring.application.name=store
spring.profiles.active=dev
server.port=8090
server.servlet.context-path=/api
server.error.whitelabel.enabled=false
server.error.path=/error-disabled
spring.jpa.hibernate.ddl-auto=create-drop
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# JWT
app.jwt-secret=${JWT_SECRET}
app.jwt-validity=${JWT_VALIDITY:10000}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3090,http://localhost:4200}

# JWT
app.security.jwt.secret=${JWT_SECRET:change-me-in-env}
app.security.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
app.security.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:604800}
app.security.jwt.issuer=${JWT_ISSUER:shopwave-api}

# Repository retry (exponential backoff on transient errors; read-only, no active tx).
# Values are clamped: max-attempts 1–10, initial 10–60000 ms, multiplier 1–5, max-interval 1000–300000 ms.
app.repository.retry.max-attempts=${REPO_RETRY_MAX_ATTEMPTS:4}
app.repository.retry.initial-interval-ms=${REPO_RETRY_INITIAL_MS:100}
app.repository.retry.multiplier=${REPO_RETRY_MULTIPLIER:2.0}
app.repository.retry.max-interval-ms=${REPO_RETRY_MAX_INTERVAL_MS:10000}

# Database (MySQL)
app.database.url=${DB_URL:jdbc:mysql://localhost:3306/shopwave}
app.database.username=${DB_USERNAME:root}
app.database.password=${DB_PASSWORD:password123}
app.database.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
app.database.maximum-pool-size=${DB_POOL_SIZE:10}
app.database.minimum-idle=${DB_POOL_MIN_IDLE:2}
app.database.connection-timeout=${DB_CONNECTION_TIMEOUT:30000}
app.database.idle-timeout=${DB_IDLE_TIMEOUT:600000}

# Cache (Redis key namespace)
app.cache.namespace=${APP_CACHE_NAMESPACE:app}

# Redis
app.redis.host=${REDIS_HOST:localhost}
app.redis.port=${REDIS_PORT:6379}
app.redis.password=${REDIS_PASSWORD:}
app.redis.database=${REDIS_DATABASE:0}
app.redis.timeout=${REDIS_TIMEOUT:2000}

# BCrypt cost factor: 10 is secure for prod; set BCRYPT_STRENGTH=4 locally to reduce login latency
app.security.bcrypt-strength=${BCRYPT_STRENGTH:10}

# Google
app.security.google-client-id=${GOOGLE_CLIENT_ID:}

# Microsoft OAuth (override JWKS URI for sovereign clouds or tests)
app.security.microsoft-client-id=${MICROSOFT_CLIENT_ID:}
app.security.microsoft-jwks-uri=${MICROSOFT_JWKS_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}

# Apple OAuth
app.security.apple-client-id=${APPLE_CLIENT_ID:}
app.security.apple-jwks-uri=${APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}

# OAuth token verification: retry and circuit breaker (Google/Microsoft token verification)
# Set to false (e.g. local) to log config warnings and continue startup instead of failing
app.oauth.validate-config-at-startup=${OAUTH_VALIDATE_CONFIG_AT_STARTUP:true}
app.oauth.retry.max-attempts=${OAUTH_RETRY_MAX_ATTEMPTS:4}
app.oauth.retry.initial-interval-ms=${OAUTH_RETRY_INITIAL_MS:200}
app.oauth.retry.multiplier=${OAUTH_RETRY_MULTIPLIER:2.0}
app.oauth.retry.max-interval-ms=${OAUTH_RETRY_MAX_INTERVAL_MS:10000}
app.oauth.circuit-breaker.failure-rate-threshold=${OAUTH_CB_FAILURE_RATE:50}
app.oauth.circuit-breaker.wait-duration-in-open-state-seconds=${OAUTH_CB_WAIT_SECONDS:60}
app.oauth.circuit-breaker.sliding-window-size=${OAUTH_CB_SLIDING_WINDOW:10}
app.oauth.circuit-breaker.minimum-number-of-calls=${OAUTH_CB_MIN_CALLS:5}

# Google reCAPTCHA v2 (server-side verification secret)
app.security.recaptcha-secret-key=${RECAPTCHA_SECRET_KEY:}

# reCAPTCHA siteverify: timeouts (ms) and retry/backoff. Fail closed on 5xx or timeout after retries.
app.recaptcha.connect-timeout-ms=${RECAPTCHA_CONNECT_TIMEOUT_MS:3000}
app.recaptcha.read-timeout-ms=${RECAPTCHA_READ_TIMEOUT_MS:5000}
app.recaptcha.retry.max-attempts=${RECAPTCHA_RETRY_MAX_ATTEMPTS:4}
app.recaptcha.retry.initial-interval-ms=${RECAPTCHA_RETRY_INITIAL_MS:200}
app.recaptcha.retry.multiplier=${RECAPTCHA_RETRY_MULTIPLIER:2.0}
app.recaptcha.retry.max-interval-ms=${RECAPTCHA_RETRY_MAX_INTERVAL_MS:10000}

# Stripe (payments)
app.stripe.secret-key=${STRIPE_SECRET_KEY:}
app.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.stripe.retry.max-attempts=${STRIPE_RETRY_MAX_ATTEMPTS:3}
app.stripe.retry.initial-interval-ms=${STRIPE_RETRY_INITIAL_MS:500}
app.stripe.retry.multiplier=${STRIPE_RETRY_MULTIPLIER:2.0}
app.stripe.retry.max-interval-ms=${STRIPE_RETRY_MAX_INTERVAL_MS:8000}

# S3 (file uploads — pre-signed PUT URLs)
app.s3.region=${AWS_S3_REGION:us-east-1}
app.s3.bucket=${AWS_S3_BUCKET:}
app.s3.access-key=${AWS_ACCESS_KEY_ID:}
app.s3.secret-key=${AWS_SECRET_ACCESS_KEY:}
app.s3.public-url-base=${AWS_S3_PUBLIC_URL_BASE:}
app.s3.presign-expiry-seconds=${AWS_S3_PRESIGN_EXPIRY_SECONDS:300}

server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.max-connections=2000
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=60000
server.tomcat.max-keep-alive-requests=100

# Email (Gmail SMTP via app password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.email.from=${MAIL_FROM:noreply@shopwave.com}
app.email.verification-base-url=${EMAIL_VERIFICATION_BASE_URL:http://localhost:3090}
app.email.verification-token-ttl-seconds=${EMAIL_VERIFICATION_TTL_SECONDS:86400}
app.email.executor.core-pool-size=${EMAIL_EXECUTOR_CORE_POOL_SIZE:2}
app.email.executor.max-pool-size=${EMAIL_EXECUTOR_MAX_POOL_SIZE:4}
app.email.executor.queue-capacity=${EMAIL_EXECUTOR_QUEUE_CAPACITY:100}
app.email.retry.max-attempts=${EMAIL_RETRY_MAX_ATTEMPTS:3}
app.email.retry.initial-interval-ms=${EMAIL_RETRY_INITIAL_MS:1000}
app.email.retry.multiplier=${EMAIL_RETRY_MULTIPLIER:2.0}
app.email.retry.max-interval-ms=${EMAIL_RETRY_MAX_INTERVAL_MS:10000}
app.email.device-verification-token-ttl-seconds=${DEVICE_VERIFICATION_TTL_SECONDS:600}

# Coupon expiry scheduler
app.coupon.expiry.interval-ms=${COUPON_EXPIRY_INTERVAL_MS:3600000}

# Redis distributed lock TTL for order/inventory operations.
# Must be long enough to cover risk assessment + payment API round-trip (target: 60 s).
app.lock.ttl-seconds=${LOCK_TTL_SECONDS:60}

# Stock reservation (checkout hold window).
# stale-minutes MUST be less than reservation.ttl-seconds / 60 so the scheduler
# compensates stale orders before their Redis reservation key expires, preventing
# stock from being double-restored on items that were already re-allocated.
app.order.reservation.ttl-seconds=${ORDER_RESERVATION_TTL_SECONDS:1200}
app.order.stale-minutes=${ORDER_STALE_MINUTES:10}

# Demand tracking — hot products / velocity ranking
app.demand.refresh-interval-ms=${DEMAND_REFRESH_INTERVAL_MS:300000}
app.demand.cache-ttl-1h-seconds=${DEMAND_CACHE_TTL_1H:300}
app.demand.cache-ttl-24h-seconds=${DEMAND_CACHE_TTL_24H:900}

# Elasticsearch
app.elasticsearch.host=${ES_HOST:localhost}
app.elasticsearch.port=${ES_PORT:9200}
app.elasticsearch.scheme=${ES_SCHEME:http}
app.elasticsearch.api-key=${ES_API_KEY:}
app.elasticsearch.username=${ES_USERNAME:}
app.elasticsearch.password=${ES_PASSWORD:}
app.elasticsearch.indexing.worker-count=${ES_INDEXING_WORKER_COUNT:2}
app.elasticsearch.indexing.queue-capacity=${ES_INDEXING_QUEUE_CAPACITY:500}
app.elasticsearch.indexing.batch-size=${ES_INDEXING_BATCH_SIZE:25}
# Retry scheduler: interval between DLQ retry runs (ms). Exhausted after 5 failed attempts.
app.elasticsearch.retry.interval-ms=${ES_RETRY_INTERVAL_MS:60000}
# Full reindex: cron expression for scheduled weekly reindex (disabled by default — set to enable).
app.elasticsearch.full-reindex.cron=${ES_FULL_REINDEX_CRON:-}
# Index versioning: alias-based versioned indices (products_v1, products_v2, …).
app.elasticsearch.versioning.enabled=${ES_VERSIONING_ENABLED:true}

spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true

# Risk / fraud engine. SHADOW mode writes assessments but does NOT block orders;
# flip RISK_MODE=ENFORCE once thresholds are tuned from shadow data.
app.risk.enabled=${RISK_ENABLED:true}
app.risk.mode=${RISK_MODE:SHADOW}
app.risk.verify-threshold=${RISK_VERIFY_THRESHOLD:40}
app.risk.block-threshold=${RISK_BLOCK_THRESHOLD:70}
app.risk.vip-segment-id=${RISK_VIP_SEGMENT_ID:-1}
app.risk.failed-payment.window-minutes=${RISK_FP_WINDOW_MIN:60}
app.risk.failed-payment.medium-count=${RISK_FP_MED_COUNT:2}
app.risk.failed-payment.high-count=${RISK_FP_HIGH_COUNT:5}
app.risk.failed-payment.ip-window-hours=${RISK_FP_IP_WINDOW_H:24}
app.risk.failed-payment.ip-high-count=${RISK_FP_IP_HIGH_COUNT:10}
app.risk.device.distinct-users-medium=${RISK_DEV_MED:2}
app.risk.device.distinct-users-high=${RISK_DEV_HIGH:4}
app.risk.device.burst-window-minutes=${RISK_DEV_BURST_MIN:60}
app.risk.account-age.new-minutes=${RISK_ACCT_NEW_MIN:60}
app.risk.coupon.per-user-24h-high=${RISK_COUPON_USER_HIGH:5}
app.risk.coupon.per-ip-24h-high=${RISK_COUPON_IP_HIGH:10}
app.risk.coupon.first-order-pct-threshold=${RISK_COUPON_FIRST_ORDER_PCT:20}
app.risk.return-policy.rate-high=${RISK_RET_RATE_HIGH:0.5}
app.risk.return-policy.rate-min-denominator=${RISK_RET_RATE_MIN_DEN:5}
app.risk.return-policy.fast-minutes=${RISK_RET_FAST_MIN:60}
app.risk.return-policy.fast-high-value-usd=${RISK_RET_FAST_HIGH_VALUE:500}
app.risk.return-policy.window-days=${RISK_RET_WINDOW_D:14}
app.risk.return-policy.repeat-count-high=${RISK_RET_REPEAT_HIGH:3}
# Subscription / recurring orders
app.subscription.reminder.cron=${SUB_REMINDER_CRON:0 0 8 * * *}
app.subscription.default-discount-percent=${SUB_DEFAULT_DISCOUNT:0}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.properties.max.block.ms=2000
spring.kafka.producer.properties.delivery.timeout.ms=5000
spring.kafka.producer.properties.request.timeout.ms=3000
spring.kafka.producer.acks=1

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=backend.events.activity,backend.events.email
spring.kafka.consumer.properties.spring.json.type.mapping=\
  productChanged:backend.events.activity.ProductChangedEvent,\
  bundleChanged:backend.events.activity.BundleChangedEvent,\
  emailEvent:backend.events.email.EmailEvent

# Topics (single source of truth)
app.kafka.topics.user-activity=user-activity
app.kafka.topics.product-events=product-events
app.kafka.topics.bundle-events=bundle-events
app.kafka.topics.email-events=email-events

# Global kill switch — set to false to disable all activity publishing
app.activity-tracking.enabled=${ACTIVITY_TRACKING_ENABLED:true}
