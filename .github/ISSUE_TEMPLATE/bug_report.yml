name: Bug report
description: Report something in ShopWave that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve ShopWave. Please include enough detail for someone else to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Briefly describe the bug and the behavior you expected instead.
      placeholder: "Example: Adding the same product twice creates two cart rows instead of increasing the quantity."
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Affected domain
      description: Which part of the codebase does this affect?
      options:
        - Frontend
        - Backend
        - Both
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Where did you notice the issue?
      options:
        - Storefront
        - Search or product browsing
        - Cart or checkout
        - Orders
        - User accounts
        - Admin tools
        - API
        - Database
        - Dev tooling
        - Documentation
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Choose the priority label for this bug.
      options:
        - "priority:high"
        - "priority:medium"
        - "priority:low"
    validations:
      required: true

  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      description: Choose the expected complexity label for this bug.
      options:
        - "complexity:high"
        - "complexity:medium"
        - "complexity:low"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps someone can follow to see the bug.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Submit ...
        4. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
      placeholder: "The cart quantity should increase to 2."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include errors, screenshots, or logs if useful.
      placeholder: "Two separate cart rows appear for the same product."
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, app mode, or API/client versions.
      placeholder: "Chrome 124 on Windows 11, local dev, frontend on npm run dev"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste logs, stack traces, network responses, or attach screenshots.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked for existing issues that describe the same problem.
          required: true
        - label: I included clear reproduction steps or explained why the issue is intermittent.
          required: true
